name: Publish Docker image

# Publishes a multi-arch image to Docker Hub on a version tag (e.g. v2.1.0),
# gated by a Trivy HIGH/CRITICAL scan of the built image.
#
# Required repository configuration (Settings -> Secrets and variables -> Actions):
#   Secrets:   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN  (a Docker Hub access token)
#   Variable:  DOCKERHUB_IMAGE  (e.g. ringosystems/homey-wan-kenobi)
#              If unset, falls back to the default below.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: ${{ vars.DOCKERHUB_IMAGE || 'ringosystems/homey-wan-kenobi' }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # Build a single-arch image locally so Trivy can scan exactly what we ship.
      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: scan-target:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (gate on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: scan-target:latest
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
