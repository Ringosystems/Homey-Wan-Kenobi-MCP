name: Publish Docker image

# On a version tag (e.g. v2.1.0): build a multi-arch image, gate it on a Trivy
# HIGH/CRITICAL scan, push to Docker Hub and GHCR, and sync the Docker Hub
# overview. On success, a separate workflow (publish-mcp-registry.yml) publishes
# the entry to the MCP Registry.
#
# Required repository configuration (Settings -> Secrets and variables -> Actions):
#   Secrets:   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN  (a Docker Hub access token)
#   Variable:  DOCKERHUB_IMAGE  (e.g. ringosystems/homey-wan-kenobi; falls back to the default below)
# GHCR uses the built-in GITHUB_TOKEN. The MCP Registry uses GitHub OIDC (no secret).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # push to GHCR

env:
  IMAGE: ${{ vars.DOCKERHUB_IMAGE || 'ringosystems/homey-wan-kenobi' }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE }}
            ghcr.io/${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # Build a single-arch image locally so Trivy scans exactly what we ship.
      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: scan-target:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (gate on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: scan-target:latest
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch, Docker Hub + GHCR)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync Docker Hub description
        if: startsWith(github.ref, 'refs/tags/v')
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE }}
          short-description: "MCP server for Homey Pro: 60 tools for devices, flows, energy, and Z-Wave/Zigbee diagnostics."
          readme-filepath: ./DOCKERHUB.md

      # The MCP Registry entry is published by .github/workflows/publish-mcp-registry.yml
      # (separate workflow, also triggered on v* tags).
