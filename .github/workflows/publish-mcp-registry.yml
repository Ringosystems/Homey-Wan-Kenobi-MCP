name: Publish to MCP Registry

# Publishes the server.json entry to registry.modelcontextprotocol.io via GitHub
# OIDC (no secret needed). Runs after the "Publish Docker image" workflow finishes
# a tag release (so the referenced image is already pushed and public), and can be
# dispatched manually to (re)publish the current package.json version.

on:
  workflow_run:
    workflows: ["Publish Docker image"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC for the MCP Registry

jobs:
  publish:
    # Manual dispatch, or only after a successful tag-triggered image publish.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Determine version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Pin server.json to this version
        run: |
          V="${{ steps.ver.outputs.version }}"
          jq --arg v "$V" --arg id "docker.io/ringosystems/homey-wan-kenobi:$V" \
            '.version = $v | .packages[0].identifier = $id' server.json > server.tmp
          mv server.tmp server.json
          cat server.json

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
